<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <style>
  /* 全局重置 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
  }

  /* 顶部背景图区域 */
  .hero-banner {
    width: 100%;
    height: 400px; /* 匹配参考图高度 */
    background: url('./images/banner.png') center/cover no-repeat; /* 你的背景图 */
    position: relative;
    color: white;
    margin: -20px -20px 40px -20px;
  }

  /* 帮助中心顶部小标题 */
  .hero-header {
    position: absolute;
    top: 20px;
    left: 40px;
    font-size: 16px;
    color: #07a14f; /* 参考图的蓝色 */
    font-weight: 500;
  }

  /* 中间内容区 */
  .hero-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
    padding: 0 20px;
  }

  .hero-content h1 {
    font-size: 36px;
    margin-bottom: 30px;
    font-weight: 500;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  /* 搜索框样式（匹配参考图） */
  .search-box {
    width: 600px;
    margin: 0 auto 20px;
  }

  .search-box input {
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    color: #333;
    outline: none;
  }

  .search-box input::placeholder {
    color: #999;
  }

  /* 热门搜索 */
  .hot-search {
    font-size: 14px;
    color: white;
  }

  .hot-search span {
    margin-right: 8px;
  }

  .hot-search a {
    color: white;
    text-decoration: none;
    margin: 0 8px;
  }

  .hot-search a:hover {
    text-decoration: underline;
  }

  /* 卡片网格（3列布局，匹配参考图） */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px; /* 增大间距，匹配参考图 */
    padding: 0 20px !important;
    width: 100% !important;
    margin-bottom: 60px;
  }

  /* 卡片样式 */
  .card {
    padding: 30px 20px;
    border: none;
    border-radius: 0;
    background: white;
    box-shadow: none;
  }

  /* 卡片图标 */
  .card-icon {
    font-size: 24px;
    color: #07a14f; /* 参考图的蓝色图标 */
    margin-bottom: 16px;
    display: inline-block;
    margin-right: 10px;
    vertical-align: middle;
  }

  .card h3 {
    font-size: 20px;
    color: #333;
    margin-bottom: 20px;
    display: inline-block;
    vertical-align: middle;
    font-weight: 500;
  }

  /* 卡片列表 */
  .card ul {
    list-style: disc;
    padding-left: 40px;
    margin-bottom: 20px;
    color: #666;
    line-height: 1.8;
  }

  /* 查看更多链接 */
  .more-link {
    font-size: 14px;
    color: #666;
    text-decoration: none;
    margin-left: 40px;
  }

  .more-link:hover {
    color: #07a14f;
  }

  .content {
    margin-left: 0 !important;
    padding: 0 !important;
  }
  /* 隐藏 Docsify 默认的顶部标题和侧边栏 */
.app-name, .sidebar {
  display: none !important;
}
/* 让内容区占满全屏，去掉左边距 */
.content {
  margin-left: 0 !important;
  padding-top: 0 !important;
  width: 100% !important; /*新增这一行，让内容占满全屏宽度 */
}
</style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '数字农人帮助中心',
      repo: '',
      loadSidebar: true,
      loadNavbar: false,
      homepage: 'README.md',
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '输入关键词检索帮助内容',
        noData: '未找到相关内容',
        depth: 6,
        hideOtherSidebarContent: false,
        namespace: 'shunong-help'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
